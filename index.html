<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- React & Babel CDNs -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'node-dark': '#0a0a0a',
                        'node-gray': '#1a1a1a',
                        'node-accent': '#40E0D0',
                        'node-blue': '#0070f3',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }

    <style type="text/css">
        body {
            background-color: #0a0a0a;
            color: #f3f4f6;
        }
        .node-grid {

        }
        .glass-card {
            background: rgba(26, 26, 26, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
        }
        .text-gradient {
            background: linear-gradient(to right, #fff, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Custom animations to replace Framer Motion in standalone */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="selection:bg-node-accent selection:text-node-dark">

                            },
                            {

                                icon: "shield-check"
                            }
                        ].map((item, i) => (
                            <div key={i} className="glass-card p-8 text-left hover:border-node-accent/50 transition-colors">
                                <i data-lucide={item.icon} className="w-10 h-10 text-node-accent mb-6"></i>

                                title: "Workflow Orchestration",
                                desc: "Complex, production-grade automation pipelines that connect your AI swarms to your existing business tools.",

                                <div className="flex justify-between items-start mb-6">
                                    <div className="w-12 h-12 rounded-lg bg-node-accent/10 flex items-center justify-center">
                                        <i data-lucide={service.icon} className="text-node-accent"></i>
                                    </div>
                                    <i data-lucide="arrow-up-right" className="w-5 h-5 text-gray-600 group-hover:text-node-accent transition-colors"></i>
                                </div>
                                <h3 className="text-xl font-bold mb-3">{service.title}</h3>
                                <p className="text-gray-500 mb-6 text-sm leading-relaxed">{service.desc}</p>
                                <div className="flex flex-wrap gap-2">
                                    {service.tags.map((tag, j) => (
                                        <span key={j} className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded bg-white/5 text-gray-400 border border-white/5">

                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const About = () => (

                    <div className="glass-card p-12 flex flex-col md:flex-row gap-12 items-center">
                        <div className="w-48 h-48 shrink-0 rounded-2xl bg-node-accent border border-white/10 overflow-hidden relative flex items-center justify-center">

                                        className="w-5 h-5 object-cover invert brightness-200"

                                    <i data-lucide="mail" className="w-5 h-5"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

        );

        const Footer = () => (

                <div className="max-w-7xl mx-auto px-6 text-center">
                    <h2 className="text-5xl md:text-7xl font-bold mb-8 tracking-tighter">Ready to build?</h2>

                        href="https://calendar.app.google/jTdXoN1FTVBhVYy49"
                        target="_blank"
                        rel="noopener noreferrer"
                        className="inline-block px-12 py-6 bg-node-accent text-node-dark font-black text-xl rounded-full hover:scale-105 transition-transform shadow-[0_0_40px_rgba(0,255,65,0.3)]"

                    </div>

            </footer>
        );

        const App = () => {
            useEffect(() => {
                // Initialize Lucide icons after component mounts
                // and on every subsequent potential update
                const initIcons = () => {
                    if (window.lucide) {
                        window.lucide.createIcons();
                    }
                };
                
                initIcons();
                // Short interval to catch any delayed React renders
                const timeout = setTimeout(initIcons, 100);
                return () => clearTimeout(timeout);
            }, []);

            return (
                <div className="min-h-screen">
                    <Navbar />
                    <main>
                        <Hero />
                        <Advantage />
                        <WhyLocalMatters />
                        <Services />
                        <About />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
